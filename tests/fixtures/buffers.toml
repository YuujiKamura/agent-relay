[[case]]
name = "claude_ready"
expected = "AGENT_READY"
buffer = """
╭────────────────────────────────────────╮
│        ✻ Welcome to Claude Code!       │
│                                        │
│   /help for help, /status for status   │
╰────────────────────────────────────────╯

  cwd: ~/agent-relay

> """

[[case]]
name = "gemini_ready"
expected = "AGENT_READY"
buffer = """
✦ Welcome to Gemini CLI!

> Type your message"""

[[case]]
name = "codex_ready"
expected = "AGENT_READY"
buffer = """
PowerShell 7.5.4
PS C:\Users\yuuji> codex
╭──────────────────────────────────────────────╮
│ >_ OpenAI Codex (v0.115.0)                   │
