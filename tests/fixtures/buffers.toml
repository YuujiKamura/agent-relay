# Terminal buffer samples for Librarian state judgment testing.
# Each [[case]] has: name, expected state, and a multi-line buffer sample.
# Run with: cargo test --test librarian_judgment -- --nocapture

# ═══════════════════════════════════════════
# SHELL_IDLE — bare shell prompt, no agent
# ═══════════════════════════════════════════

[[case]]
name = "bash_prompt"
expected = "SHELL_IDLE"
buffer = """
yuuji@DESKTOP-ABC ~/projects
$ """

[[case]]
name = "powershell_prompt"
expected = "SHELL_IDLE"
buffer = """
PS C:\\Users\\yuuji> """

[[case]]
name = "git_bash_prompt"
expected = "SHELL_IDLE"
buffer = """
yuuji@DESKTOP-ABC MINGW64 ~/agent-relay (main)
$ """

# ═══════════════════════════════════════════
# SHELL_BUSY — shell command running, no prompt
# ═══════════════════════════════════════════

[[case]]
name = "cargo_build_running"
expected = "SHELL_BUSY"
buffer = """
   Compiling serde v1.0.210
   Compiling tokio v1.40.0
   Compiling agent-ctl v0.1.0
"""

[[case]]
name = "npm_install_running"
expected = "SHELL_BUSY"
buffer = """
npm warn deprecated glob@7.2.3: Glob versions prior to v9 are no longer supported
npm warn deprecated inflight@1.0.6: This module is not supported
added 847 packages in 32s
"""

[[case]]
name = "git_clone_running"
expected = "SHELL_BUSY"
buffer = """
Cloning into 'repo'...
remote: Enumerating objects: 12345, done.
remote: Counting objects: 100% (12345/12345), done.
Receiving objects:  45% (5555/12345), 12.34 MiB | 5.67 MiB/s
"""

