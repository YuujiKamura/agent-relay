# ═══════════════════════════════════════════
# AGENT_WORKING — task in progress
# ═══════════════════════════════════════════

[[case]]
name = "claude_working"
expected = "AGENT_WORKING"
buffer = """
╭─ Read src/main.rs ──────────────────────╮
│ 1  use std::env;                        │
│ 2  fn main() {                          │
│ 3      println!("hello");               │
│ 4  }                                    │
╰─────────────────────────────────────────╯
"""

[[case]]
name = "gemini_working"
expected = "AGENT_WORKING"
buffer = """
✦ I'll analyze the codebase structure for you.

Thinking...

╭─ shell ─────────────────────────────────╮
│ $ ls src/                               │
╰─────────────────────────────────────────╯
"""

[[case]]
name = "codex_working"
expected = "AGENT_WORKING"
buffer = """
Working (30s • esc to interrupt)

 ⠋ Running ls src/
"""

# ═══════════════════════════════════════════
# AGENT_APPROVAL — permission request
# ═══════════════════════════════════════════

[[case]]
name = "claude_approval"
expected = "AGENT_APPROVAL"
buffer = """
╭─ Bash ──────────────────────────────────╮
│ rm -rf target/                          │
╰─────────────────────────────────────────╯

  Allow once  Allow always  Deny
"""

[[case]]
name = "gemini_approval"
expected = "AGENT_APPROVAL"
buffer = """
╭─ shell ─────────────────────────────────╮
│ $ cargo build --release                 │
╰─────────────────────────────────────────╯

Action Required: Allow execution of this command?
"""

[[case]]
name = "codex_approval"
expected = "AGENT_APPROVAL"
buffer = """
  Would you like to run the following command?
  cargo test --all

  Yes, proceed  No, skip
"""

# ═══════════════════════════════════════════
# AGENT_DONE — task completed, prompt back
# ═══════════════════════════════════════════

[[case]]
name = "claude_done"
expected = "AGENT_DONE"
buffer = """
╭─ Write src/lib.rs ──────────────────────╮
│ Created new file with 45 lines          │
╰─────────────────────────────────────────╯

  I've created the new module. The changes include:
  - Added error handling
  - Updated the tests

> """

[[case]]
name = "gemini_done"
expected = "AGENT_DONE"
buffer = """
I've analyzed the codebase and here are my findings:

1. The main entry point is `src/main.rs`
2. There are 12 modules in the project
3. Test coverage is approximately 67%

> Type your message"""

[[case]]
name = "codex_done"
expected = "AGENT_DONE"
buffer = """
› echo hello world


• echo hello world を実行して結果を確認します。

• Ran echo hello world
  └ hello
    world

─────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────

• 出力は以下でした。

  hello
  world


› Write tests for @filename

  gpt-5.4 medium · 90% left · ~"""

